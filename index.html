<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Home Workout</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0B0D14; font-family: system-ui, -apple-system, sans-serif; }
    input, textarea, button { font-family: inherit; }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: #13151F; }
    ::-webkit-scrollbar-thumb { background: #2A2D40; border-radius: 2px; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const R    = 108;
    const CIRC = +(2 * Math.PI * R).toFixed(2);

    // ── 10 Stations — 3 rounds × 40s work / 20s rest = 180s ─────
    const DEFAULT_STATIONS = [
      { id:1,  name:"Warm-up",      color:"#10B981", workSecs:180, restSecs:0,
        rounds:3, rw:40, rr:20,
        exercises:["Shoulder Rotation", "Jumping Jacks", "Butt Kick"],
        cue:"Keep moving continuously — loosen up the joints and raise your body temperature before the work begins." },
      { id:2,  name:"Cardio",       color:"#F97316", workSecs:180, restSecs:0,
        rounds:3, rw:40, rr:20,
        exercises:["High Knees", "High Knees", "High Knees"],
        cue:"Drive knees to hip height, pump arms, stay light on your feet. Push the pace — this sets the tone for the whole session." },
      { id:3,  name:"Upper Push",   color:"#8B5CF6", workSecs:180, restSecs:0,
        rounds:3, rw:40, rr:20,
        exercises:["Push-ups", "Push-ups", "Push-ups"],
        cue:"Elbows 45° from body. Chest to floor, full lockout at the top. Too easy — elevate your feet. Too hard — drop to knees. Maintain pace." },
      { id:4,  name:"Upper Pull",   color:"#3B82F6", workSecs:180, restSecs:0,
        rounds:3, rw:40, rr:20,
        exercises:["Band Rows", "Band Rows", "Band Rows"],
        cue:"Drive elbows back, squeeze shoulder blades at the top. Control the return. Don't shrug — keep shoulders down and away from your ears." },
      { id:5,  name:"Lower Squat",  color:"#06B6D4", workSecs:180, restSecs:0,
        rounds:3, rw:40, rr:20,
        exercises:["Goblet Squat", "Goblet Squat", "Goblet Squat"],
        cue:"Chest tall, knees track over toes. 3 seconds down, pause at the bottom, drive up through your heels. The slow tempo is the challenge — don't rush it." },
      { id:6,  name:"Lower Hinge",  color:"#EC4899", workSecs:180, restSecs:0,
        rounds:3, rw:40, rr:20,
        exercises:["Romanian Deadlift", "Romanian Deadlift", "Romanian Deadlift"],
        cue:"Hinge at hips, soft bend in knees. Push hips back until you feel hamstring stretch. Drive hips forward to stand tall. Flat back throughout — no rounding." },
      { id:7,  name:"Core",         color:"#F59E0B", workSecs:180, restSecs:0,
        rounds:3, rw:40, rr:20,
        exercises:["Dead Bug", "Dead Bug", "Dead Bug"],
        cue:"Lower back pressed into the floor the entire time. Extend opposite arm and leg slowly and under control. Breathe out as you extend. Control beats speed." },
      { id:8,  name:"Power",        color:"#EF4444", workSecs:180, restSecs:0,
        rounds:3, rw:40, rr:20,
        exercises:["Burpees", "Burpees", "Burpees"],
        cue:"Explode up on the jump, soft landing. Step back instead of jumping if needed. This is the hardest station — max effort for 40 seconds, then you rest." },
      { id:9,  name:"Cardio 2",     color:"#A78BFA", workSecs:180, restSecs:0,
        rounds:3, rw:40, rr:20,
        exercises:["Mountain Climbers", "Mountain Climbers", "Mountain Climbers"],
        cue:"Hips level with your shoulders — don't let them pike up. Drive knees to chest alternately at pace. Shoulders stay stacked over wrists throughout." },
      { id:10, name:"Cool-down",    color:"#14B8A6", workSecs:120, restSecs:0,
        rounds:1, rw:120, rr:0,
        exercises:["Full Body Stretch"],
        cue:"Quad stretch, hamstring, hip flexor, chest opener. Hold 20–30 seconds each side. Breathe into every stretch. Let the body slow down — you earned this." },
    ];

    // ── HR zone ──────────────────────────────────────────────────
    function hrZone(bpm) {
      if (!bpm) return { color:'#4B5280', label:'—',      bg:'#4B528018' };
      if (bpm < 100) return { color:'#3B82F6', label:'Zone 1', bg:'#3B82F618' };
      if (bpm < 120) return { color:'#10B981', label:'Zone 2', bg:'#10B98118' };
      if (bpm < 140) return { color:'#F59E0B', label:'Zone 3', bg:'#F59E0B18' };
      if (bpm < 160) return { color:'#F97316', label:'Zone 4', bg:'#F9731618' };
      return { color:'#EF4444', label:'Zone 5', bg:'#EF444418' };
    }

    // ── Audio ────────────────────────────────────────────────────
    let _ac = null;
    function getCtx() {
      if (!_ac) _ac = new (window.AudioContext || window.webkitAudioContext)();
      return _ac;
    }
    function beep(freq, dur=0.12, vol=0.28) {
      try {
        const c=getCtx(), o=c.createOscillator(), g=c.createGain();
        o.connect(g); g.connect(c.destination);
        o.frequency.value=freq;
        g.gain.setValueAtTime(vol, c.currentTime);
        g.gain.exponentialRampToValueAtTime(0.001, c.currentTime+dur);
        o.start(); o.stop(c.currentTime+dur+0.05);
      } catch(e) {}
    }
    const tick    = () => beep(440, 0.07, 0.2);
    const chime   = () => { beep(660,0.13,0.3); setTimeout(()=>beep(880,0.2,0.32),130); };
    const softChime = () => beep(660, 0.15, 0.18);
    const fanfare = () => [523,659,784,1047].forEach((f,i)=>setTimeout(()=>beep(f,0.32,0.28),i*170));

    // ── State machine ────────────────────────────────────────────
    // Phases: countdown | work | roundrest | rest | done
    function derive(stations, elapsed) {
      if (elapsed < 0) return { phase:'countdown', cd: Math.abs(elapsed) };
      let cursor = 0;
      for (let i = 0; i < stations.length; i++) {
        const s = stations[i];
        const workEnd = cursor + s.workSecs;
        if (elapsed < workEnd) {
          const sElapsed = elapsed - cursor;
          if (s.rounds > 1) {
            const roundLen  = s.rw + s.rr;
            const roundIdx  = Math.min(Math.floor(sElapsed / roundLen), s.rounds - 1);
            const rElapsed  = sElapsed - roundIdx * roundLen;
            if (rElapsed < s.rw) {
              return { phase:'work', idx:i,
                round: roundIdx+1, totalRounds: s.rounds,
                left: Math.ceil(s.rw - rElapsed),
                progress: rElapsed / s.rw };
            } else {
              return { phase:'roundrest', idx:i,
                round: roundIdx+1, totalRounds: s.rounds,
                left: Math.ceil(roundLen - rElapsed),
                progress: (rElapsed - s.rw) / s.rr };
            }
          } else {
            return { phase:'work', idx:i,
              round:1, totalRounds:1,
              left: Math.ceil(workEnd - elapsed),
              progress: sElapsed / s.workSecs };
          }
        }
        cursor = workEnd;
        if (s.restSecs > 0 && i < stations.length - 1) {
          const rEnd = cursor + s.restSecs;
          if (elapsed < rEnd) return {
            phase:'rest', idx:i, nextIdx:i+1,
            left: Math.ceil(rEnd - elapsed),
            progress: (elapsed - cursor) / s.restSecs,
          };
          cursor = rEnd;
        }
      }
      return { phase:'done' };
    }

    function fmt(s) {
      return `${Math.floor(s/60)}:${String(s%60).padStart(2,'0')}`;
    }

    // Returns elapsed time at the start of station idx
    function getStationStart(stations, idx) {
      let cursor = 0;
      for (let i = 0; i < idx; i++) {
        cursor += stations[i].workSecs;
        if (stations[i].restSecs > 0 && i < stations.length - 1) cursor += stations[i].restSecs;
      }
      return cursor;
    }

    // Returns elapsed time at the start of a specific round within a station
    function getRoundStart(stations, stationIdx, roundIdx) {
      const base = getStationStart(stations, stationIdx);
      const s    = stations[stationIdx];
      return base + roundIdx * (s.rw + s.rr);
    }

    // ── Atoms ────────────────────────────────────────────────────
    const iBase = {
      width:'100%', background:'#1A1D2E', border:'1px solid #252940',
      borderRadius:6, color:'white', padding:'7px 10px',
      fontSize:13, outline:'none',
    };

    function FL({ children }) {
      return <div style={{ fontSize:9, color:'#6B7280', fontWeight:700,
        letterSpacing:'0.1em', marginTop:10, marginBottom:4 }}>
        {String(children).toUpperCase()}
      </div>;
    }

    // ── HR Badge ─────────────────────────────────────────────────
    function HRBadge({ bpm }) {
      const z = hrZone(bpm);
      return (
        <div style={{ position:'absolute', top:16, left:16,
          background:z.bg, border:`1px solid ${z.color}55`,
          borderRadius:10, padding:'8px 14px',
          display:'flex', flexDirection:'column', alignItems:'center', gap:2, minWidth:72 }}>
          <div style={{ fontSize:9, color:z.color, fontWeight:700, letterSpacing:'0.12em' }}>♥ HEART RATE</div>
          <div style={{ fontSize:28, fontWeight:900, color:bpm?z.color:'#4B5280',
            lineHeight:1, fontVariantNumeric:'tabular-nums' }}>{bpm??'––'}</div>
          <div style={{ fontSize:9, color:bpm?z.color:'#4B5280', fontWeight:700 }}>
            {bpm ? `BPM · ${z.label}` : 'NO SIGNAL'}
          </div>
        </div>
      );
    }

    // ── Round dots ───────────────────────────────────────────────
    function RoundDots({ round, total, color }) {
      if (total <= 1) return null;
      return (
        <div style={{ display:'flex', gap:6, alignItems:'center', marginBottom:8 }}>
          {Array.from({ length:total }, (_,i) => (
            <div key={i} style={{
              width: i === round-1 ? 10 : 8,
              height: i === round-1 ? 10 : 8,
              borderRadius:'50%',
              background: i < round-1 ? color : i === round-1 ? color : '#1E2130',
              opacity: i < round-1 ? 0.4 : 1,
              transition:'all 0.3s',
            }} />
          ))}
        </div>
      );
    }

    // ── Config View ──────────────────────────────────────────────
    function ConfigView({ stations, onUpdate, onStart, hrUrl, onHrUrlChange }) {
      const [openIdx, setOpenIdx] = useState(null);
      const [showHr,  setShowHr]  = useState(false);
      const totalMins = Math.ceil(
        stations.reduce((a,s,i) => a + s.workSecs + (i < stations.length-1 ? s.restSecs : 0), 0) / 60
      );

      return (
        <div style={{ background:'#0B0D14', minHeight:'100vh', color:'white', padding:'22px 16px' }}>
          <div style={{ textAlign:'center', marginBottom:24 }}>
            <div style={{ fontSize:11, letterSpacing:'0.22em', color:'#4B5280', fontWeight:700, marginBottom:6 }}>
              HOME WORKOUT
            </div>
            <div style={{ fontSize:28, fontWeight:900 }}>Configure Session</div>
            <div style={{ fontSize:12, color:'#6B7280', marginTop:5 }}>
              ~{totalMins} min · {stations.length} stations · 3 rounds per station
            </div>
          </div>

          <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:10, maxWidth:720, margin:'0 auto 20px' }}>
            {stations.map((s, i) => {
              const isOpen = openIdx === i;
              const isMulti = s.rounds > 1;
              return (
                <div key={s.id} style={{ background:'#13151F', borderRadius:10,
                  border:`1px solid ${isOpen ? s.color : '#1E2130'}`,
                  overflow:'hidden', transition:'border-color 0.2s' }}>
                  <div onClick={() => setOpenIdx(isOpen ? null : i)}
                    style={{ padding:'12px 13px', cursor:'pointer',
                      display:'flex', alignItems:'center', gap:10 }}>
                    <div style={{ width:4, alignSelf:'stretch', minHeight:40,
                      borderRadius:2, background:s.color, flexShrink:0 }} />
                    <div style={{ flex:1, minWidth:0 }}>
                      <div style={{ fontSize:9, color:s.color, fontWeight:700, letterSpacing:'0.1em' }}>
                        STATION {s.id}
                      </div>
                      <div style={{ fontSize:15, fontWeight:800 }}>{s.name}</div>
                      <div style={{ fontSize:11, color:'#6B7280',
                        whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis' }}>
                        {s.exercises.join(' · ')}
                      </div>
                    </div>
                    <div style={{ textAlign:'right', flexShrink:0 }}>
                      {isMulti
                        ? <><div style={{ fontSize:13, fontWeight:800, color:s.color }}>{s.rounds}×{s.rw}s</div>
                            <div style={{ fontSize:9, color:'#4B5280' }}>{s.rr}s rest</div></>
                        : <><div style={{ fontSize:13, fontWeight:800, color:s.color }}>{fmt(s.workSecs)}</div>
                            <div style={{ fontSize:9, color:'#4B5280' }}>continuous</div></>
                      }
                    </div>
                    <div style={{ color:'#4B5280', fontSize:11 }}>{isOpen?'▲':'▼'}</div>
                  </div>
                  {isOpen && (
                    <div style={{ padding:'0 13px 14px', borderTop:'1px solid #1E2130' }}>
                      {s.exercises.map((ex, ri) => (
                        <div key={ri}>
                          <FL>{s.rounds > 1 ? `Round ${ri+1} Exercise` : 'Exercise'}</FL>
                          <input value={ex}
                            onChange={e => {
                              const next = [...s.exercises];
                              next[ri] = e.target.value;
                              onUpdate(i, 'exercises', next);
                            }}
                            style={iBase} />
                        </div>
                      ))}
                      <FL>Coaching Cue</FL>
                      <textarea value={s.cue}
                        onChange={e => onUpdate(i, 'cue', e.target.value)}
                        rows={3}
                        style={{ ...iBase, resize:'vertical', lineHeight:1.5 }} />
                    </div>
                  )}
                </div>
              );
            })}
          </div>

          {/* HR Monitor */}
          <div style={{ maxWidth:720, margin:'0 auto 20px' }}>
            <div onClick={() => setShowHr(v=>!v)}
              style={{ display:'flex', alignItems:'center', justifyContent:'space-between',
                background:'#13151F', border:'1px solid #1E2130', borderRadius:10,
                padding:'11px 14px', cursor:'pointer' }}>
              <div style={{ display:'flex', alignItems:'center', gap:10 }}>
                <div style={{ fontSize:16 }}>♥</div>
                <div>
                  <div style={{ fontSize:13, fontWeight:700 }}>Heart Rate Monitor</div>
                  <div style={{ fontSize:11, color:'#6B7280' }}>Apple Watch via local relay</div>
                </div>
              </div>
              <div style={{ color:'#4B5280', fontSize:11 }}>{showHr?'▲':'▼'}</div>
            </div>
            {showHr && (
              <div style={{ background:'#13151F', border:'1px solid #1E2130',
                borderTop:'none', borderRadius:'0 0 10px 10px', padding:'12px 14px' }}>
                <FL>Relay Server URL</FL>
                <input value={hrUrl} onChange={e=>onHrUrlChange(e.target.value)}
                  placeholder="http://192.168.x.x:3000/hr" style={iBase} />
                <div style={{ fontSize:10, color:'#4B5280', marginTop:6, lineHeight:1.5 }}>
                  Run <code style={{ color:'#F97316' }}>node server.js</code> on your Mac and paste the Network URL here.
                </div>
              </div>
            )}
          </div>

          {/* Start */}
          <div style={{ maxWidth:720, margin:'0 auto', textAlign:'center' }}>
            <div style={{ display:'flex', justifyContent:'center', gap:5, flexWrap:'wrap', marginBottom:18 }}>
              {stations.map(s => (
                <div key={s.id} style={{ padding:'3px 9px', borderRadius:20,
                  background:`${s.color}18`, border:`1px solid ${s.color}44`,
                  fontSize:9, color:s.color, fontWeight:700 }}>
                  {s.name}
                </div>
              ))}
            </div>
            <button onClick={onStart}
              style={{ background:'#F97316', border:'none', color:'white',
                fontSize:17, fontWeight:900, padding:'15px 56px', borderRadius:10,
                cursor:'pointer', letterSpacing:'0.08em',
                boxShadow:'0 0 28px rgba(249,115,22,0.4)' }}>
              ▶&nbsp;&nbsp;START WORKOUT
            </button>
          </div>
        </div>
      );
    }

    // ── Session View ─────────────────────────────────────────────
    function SessionView({ ws, stations, onStop, hrBpm, onNext, onPrev, isFirst, isLast }) {
      const st     = stations[ws.idx ?? 0];
      const isWork      = ws.phase === 'work';
      const isRoundRest = ws.phase === 'roundrest';
      const isRest      = ws.phase === 'rest';
      const isCd        = ws.phase === 'countdown';
      const isDone      = ws.phase === 'done';

      const accent = isWork      ? (st?.color ?? '#F97316')
                   : isRoundRest ? (st?.color ?? '#F97316')
                   : isRest      ? '#3B82F6'
                   : isDone      ? '#10B981'
                   :               '#F97316';

      const offset = CIRC * (1 - (ws.progress ?? 0));

      return (
        <div style={{ background:'#0B0D14', minHeight:'100vh', color:'white',
          display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center',
          padding:'20px', position:'relative' }}>

          <HRBadge bpm={hrBpm} />

          <button onClick={onStop}
            style={{ position:'absolute', top:16, right:16, background:'#1E2130',
              border:'1px solid #2A2D40', color:'#6B7280', borderRadius:8,
              padding:'6px 16px', fontSize:11, cursor:'pointer', fontWeight:700 }}>
            ✕ END
          </button>

          {/* Station progress dots */}
          <div style={{ display:'flex', gap:5, marginBottom:28, alignItems:'center', flexWrap:'wrap', justifyContent:'center', maxWidth:400 }}>
            {stations.map((s, i) => {
              const done   = (ws.idx??0) > i || isDone;
              const active = (ws.idx??0) === i && !isDone;
              return (
                <div key={s.id} style={{ display:'flex', flexDirection:'column', alignItems:'center', gap:3 }}>
                  <div style={{ width:active?24:8, height:8, borderRadius:4,
                    background: done ? s.color : active ? accent : '#1E2130',
                    transition:'all 0.4s' }} />
                  {active && (
                    <div style={{ fontSize:6, color:accent, fontWeight:700, letterSpacing:'0.06em' }}>
                      {s.id}
                    </div>
                  )}
                </div>
              );
            })}
          </div>

          {/* COUNTDOWN */}
          {isCd && (
            <div style={{ textAlign:'center' }}>
              <div style={{ fontSize:13, color:'#6B7280', fontWeight:700, letterSpacing:'0.25em', marginBottom:22 }}>
                GET READY
              </div>
              <div style={{ fontSize:140, fontWeight:900, color:'#F97316', lineHeight:1,
                textShadow:'0 0 70px rgba(249,115,22,0.5)' }}>
                {ws.cd}
              </div>
              <div style={{ fontSize:14, color:'#4B5280', marginTop:22 }}>
                First up — <strong style={{ color:'white' }}>
                  {stations[0].name}: {stations[0].exercises[0]}
                </strong>
              </div>
            </div>
          )}

          {/* DONE */}
          {isDone && (
            <div style={{ textAlign:'center' }}>
              <div style={{ fontSize:60, marginBottom:14 }}>🏁</div>
              <div style={{ fontSize:32, fontWeight:900, color:'#10B981', marginBottom:8 }}>
                Session Complete!
              </div>
              <div style={{ fontSize:14, color:'#6B7280', marginBottom:30 }}>
                {stations.length} stations · great work
              </div>
              <button onClick={onStop}
                style={{ background:'#10B981', border:'none', color:'white',
                  fontSize:15, fontWeight:800, padding:'14px 42px', borderRadius:10, cursor:'pointer' }}>
                ← Back to Config
              </button>
            </div>
          )}

          {/* WORK */}
          {isWork && st && (
            <>
              <div style={{ fontSize:11, fontWeight:800, letterSpacing:'0.2em',
                color:accent, marginBottom:4, textAlign:'center' }}>
                STATION {(ws.idx??0)+1} OF {stations.length}
              </div>
              <div style={{ fontSize:30, fontWeight:900, marginBottom:2, textAlign:'center' }}>
                {st.name}
              </div>
              <div style={{ fontSize:20, fontWeight:700, color:accent, marginBottom:6, textAlign:'center' }}>
                {st.exercises[(ws.round??1)-1] ?? st.exercises[0]}
              </div>

              <RoundDots round={ws.round} total={ws.totalRounds} color={accent} />
              {ws.totalRounds > 1 && (
                <div style={{ fontSize:10, color:'#6B7280', fontWeight:700,
                  letterSpacing:'0.1em', marginBottom:8 }}>
                  ROUND {ws.round} / {ws.totalRounds}
                </div>
              )}

              <div style={{ position:'relative', width:248, height:248, margin:'4px 0 12px' }}>
                <svg width="248" height="248" style={{ transform:'rotate(-90deg)' }}>
                  <circle cx="124" cy="124" r={R} fill="none" stroke="#1E2130" strokeWidth="12" />
                  <circle cx="124" cy="124" r={R} fill="none"
                    stroke={accent} strokeWidth="12" strokeLinecap="round"
                    strokeDasharray={CIRC} strokeDashoffset={offset}
                    style={{ transition:'stroke-dashoffset 0.95s linear, stroke 0.5s ease' }} />
                </svg>
                <div style={{ position:'absolute', inset:0, display:'flex',
                  flexDirection:'column', alignItems:'center', justifyContent:'center' }}>
                  <div style={{ fontSize:58, fontWeight:900, fontVariantNumeric:'tabular-nums',
                    lineHeight:1, color: ws.left<=5 ? '#EF4444' : 'white', transition:'color 0.3s' }}>
                    {ws.left}
                  </div>
                  <div style={{ fontSize:9, color:'#4B5280', fontWeight:700, marginTop:4, letterSpacing:'0.12em' }}>
                    SECONDS
                  </div>
                </div>
              </div>

              <div style={{ maxWidth:340, width:'100%', textAlign:'center',
                padding:'11px 16px', background:'#13151F',
                border:`1px solid ${accent}55`, borderRadius:9 }}>
                <div style={{ fontSize:9, color:accent, fontWeight:700, letterSpacing:'0.12em', marginBottom:5 }}>
                  COACHING CUE
                </div>
                <div style={{ fontSize:13, color:'#D1D5DB', lineHeight:1.7 }}>{st.cue}</div>
              </div>
            </>
          )}

          {/* ROUND REST */}
          {isRoundRest && st && (
            <>
              <div style={{ fontSize:11, fontWeight:800, letterSpacing:'0.2em',
                color:accent, marginBottom:4, textAlign:'center' }}>
                STATION {(ws.idx??0)+1} — {st.name.toUpperCase()}
              </div>
              <div style={{ fontSize:22, fontWeight:900, marginBottom:4, textAlign:'center', color:'#6B7280' }}>
                Round {ws.round} done
              </div>
              {ws.round < ws.totalRounds
                ? <div style={{ fontSize:13, color:'#4B5280', marginBottom:10, textAlign:'center' }}>
                    Round {ws.round+1} coming up — <span style={{ color:'white' }}>
                      {st.exercises[ws.round] ?? st.exercises[0]}
                    </span>
                  </div>
                : stations[(ws.idx??0)+1]
                  ? <div style={{ fontSize:13, color:'#4B5280', marginBottom:10, textAlign:'center' }}>
                      Up next — <span style={{ color:'white', fontWeight:700 }}>
                        {stations[(ws.idx??0)+1].name}
                      </span>
                      {' · '}{stations[(ws.idx??0)+1].exercises[0]}
                    </div>
                  : <div style={{ fontSize:13, color:'#4B5280', marginBottom:10, textAlign:'center' }}>
                      Last station — finish strong
                    </div>
              }

              <RoundDots round={ws.round} total={ws.totalRounds} color={accent} />

              <div style={{ position:'relative', width:180, height:180, margin:'8px 0 12px' }}>
                <svg width="180" height="180" style={{ transform:'rotate(-90deg)' }}>
                  <circle cx="90" cy="90" r={72} fill="none" stroke="#1E2130" strokeWidth="10" />
                  <circle cx="90" cy="90" r={72} fill="none"
                    stroke={`${accent}88`} strokeWidth="10" strokeLinecap="round"
                    strokeDasharray={+(2*Math.PI*72).toFixed(2)}
                    strokeDashoffset={+(2*Math.PI*72*(1-(ws.progress??0))).toFixed(2)}
                    style={{ transition:'stroke-dashoffset 0.95s linear' }} />
                </svg>
                <div style={{ position:'absolute', inset:0, display:'flex',
                  flexDirection:'column', alignItems:'center', justifyContent:'center' }}>
                  <div style={{ fontSize:46, fontWeight:900, fontVariantNumeric:'tabular-nums',
                    lineHeight:1, color: ws.left<=3 ? '#EF4444' : '#6B7280', transition:'color 0.3s' }}>
                    {ws.left}
                  </div>
                  <div style={{ fontSize:9, color:'#4B5280', fontWeight:700, letterSpacing:'0.1em', marginTop:4 }}>
                    NEXT ROUND
                  </div>
                </div>
              </div>
            </>
          )}

          {/* Prev / Next nav */}
          {!isCd && !isDone && (
            <div style={{ display:'flex', gap:10, marginTop:18 }}>
              <button onClick={onPrev} disabled={isFirst}
                style={{ background:'#1A1D2E', border:'1px solid #252940', color: isFirst ? '#2A2D40' : '#9CA3AF',
                  borderRadius:8, padding:'8px 20px', fontSize:12, fontWeight:700,
                  cursor: isFirst ? 'default' : 'pointer', letterSpacing:'0.06em' }}>
                ← PREV
              </button>
              <button onClick={onNext} disabled={isLast}
                style={{ background:'#1A1D2E', border:'1px solid #252940', color: isLast ? '#2A2D40' : '#9CA3AF',
                  borderRadius:8, padding:'8px 20px', fontSize:12, fontWeight:700,
                  cursor: isLast ? 'default' : 'pointer', letterSpacing:'0.06em' }}>
                NEXT →
              </button>
            </div>
          )}

          {/* INTER-STATION REST */}
          {isRest && st && (
            <>
              <div style={{ fontSize:11, fontWeight:800, letterSpacing:'0.2em',
                color:'#3B82F6', marginBottom:6, textAlign:'center' }}>
                REST — UP NEXT: STATION {(ws.nextIdx??0)+1}
              </div>
              <div style={{ fontSize:26, fontWeight:900, marginBottom:4, textAlign:'center' }}>
                {stations[ws.nextIdx??0]?.name}
              </div>
              <div style={{ fontSize:14, color:'#6B7280', marginBottom:14, textAlign:'center' }}>
                <span style={{ color:'white', fontWeight:600 }}>
                  {stations[ws.nextIdx??0]?.exercises[0]}
                </span>
              </div>

              <div style={{ position:'relative', width:200, height:200, margin:'0 0 14px' }}>
                <svg width="200" height="200" style={{ transform:'rotate(-90deg)' }}>
                  <circle cx="100" cy="100" r={R} fill="none" stroke="#1E2130" strokeWidth="11" />
                  <circle cx="100" cy="100" r={R} fill="none"
                    stroke="#3B82F6" strokeWidth="11" strokeLinecap="round"
                    strokeDasharray={CIRC} strokeDashoffset={offset}
                    style={{ transition:'stroke-dashoffset 0.95s linear' }} />
                </svg>
                <div style={{ position:'absolute', inset:0, display:'flex',
                  flexDirection:'column', alignItems:'center', justifyContent:'center' }}>
                  <div style={{ fontSize:52, fontWeight:900, fontVariantNumeric:'tabular-nums',
                    lineHeight:1, color: ws.left<=5 ? '#EF4444' : 'white', transition:'color 0.3s' }}>
                    {ws.left}
                  </div>
                  <div style={{ fontSize:9, color:'#4B5280', fontWeight:700, marginTop:4, letterSpacing:'0.12em' }}>
                    REST
                  </div>
                </div>
              </div>
            </>
          )}
        </div>
      );
    }

    // ── Root ─────────────────────────────────────────────────────
    function WorkoutApp() {
      const [stations, setStations] = useState(DEFAULT_STATIONS);
      const [view,     setView]     = useState('config');
      const [elapsed,  setElapsed]  = useState(-3);
      const [running,  setRunning]  = useState(false);
      const [hrUrl,    setHrUrl]    = useState('http://localhost:3000/hr');
      const [hrBpm,    setHrBpm]    = useState(null);
      const intRef  = useRef(null);
      const hrRef   = useRef(null);
      const prevRef = useRef({ phase:null, left:null, cd:null });

      const ws = derive(stations, elapsed);

      // HR polling
      useEffect(() => {
        if (view !== 'session' || !hrUrl) { clearInterval(hrRef.current); return; }
        const poll = async () => {
          try {
            const res = await fetch(hrUrl, { signal: AbortSignal.timeout(2000) });
            const d   = await res.json();
            if (d?.bpm) setHrBpm(Number(d.bpm));
          } catch(e) {}
        };
        poll();
        hrRef.current = setInterval(poll, 3000);
        return () => clearInterval(hrRef.current);
      }, [view, hrUrl]);

      // Audio
      useEffect(() => {
        if (!running) return;
        const p = prevRef.current;
        if (ws.phase !== p.phase) {
          if      (ws.phase === 'work' && p.phase === 'countdown') chime();
          else if (ws.phase === 'work')    chime();
          else if (ws.phase === 'roundrest') softChime();
          else if (ws.phase === 'rest')    chime();
          else if (ws.phase === 'done')  { fanfare(); setRunning(false); }
          p.phase = ws.phase;
        }
        if (ws.phase === 'countdown' && ws.cd !== p.cd) {
          if (ws.cd <= 3) tick();
          p.cd = ws.cd;
        }
        if ((ws.phase === 'work' || ws.phase === 'roundrest' || ws.phase === 'rest') && ws.left !== p.left) {
          if (ws.left <= 3 && ws.left > 0) tick();
          p.left = ws.left;
        }
      });

      // Timer
      useEffect(() => {
        if (running) {
          intRef.current = setInterval(() => setElapsed(e => e+1), 1000);
        } else {
          clearInterval(intRef.current);
        }
        return () => clearInterval(intRef.current);
      }, [running]);

      const startWorkout = () => {
        setElapsed(-3);
        setHrBpm(null);
        prevRef.current = { phase:'countdown', left:null, cd:3 };
        setRunning(true);
        setView('session');
      };
      const stopWorkout = () => {
        setRunning(false);
        setElapsed(-3);
        setView('config');
      };
      const updateStation = (i, field, val) =>
        setStations(s => s.map((st,idx) => idx===i ? {...st,[field]:val} : st));

      const jumpToRound = (stationIdx, roundIdx) => {
        prevRef.current = { phase: null, left: null, cd: null };
        setElapsed(getRoundStart(stations, stationIdx, roundIdx));
      };

      const curIdx   = ws.phase === 'done' ? stations.length - 1 : (ws.idx ?? 0);
      const curRound = (ws.round ?? 1) - 1; // 0-indexed

      const goNext = () => {
        const nextRound = curRound + 1;
        if (nextRound < stations[curIdx].rounds) {
          jumpToRound(curIdx, nextRound);               // next round same station
        } else if (curIdx + 1 < stations.length) {
          jumpToRound(curIdx + 1, 0);                   // first round of next station
        }
      };
      const goPrev = () => {
        const prevRound = curRound - 1;
        if (prevRound >= 0) {
          jumpToRound(curIdx, prevRound);               // prev round same station
        } else if (curIdx - 1 >= 0) {
          jumpToRound(curIdx - 1, 0);                   // first round of prev station
        }
      };

      const isFirst = curIdx === 0 && curRound === 0;
      const isLast  = curIdx === stations.length - 1 && curRound === stations[curIdx].rounds - 1;

      return view === 'session'
        ? <SessionView ws={ws} stations={stations} onStop={stopWorkout} hrBpm={hrBpm}
            onNext={goNext} onPrev={goPrev} isFirst={isFirst} isLast={isLast} />
        : <ConfigView  stations={stations} onUpdate={updateStation} onStart={startWorkout}
            hrUrl={hrUrl} onHrUrlChange={setHrUrl} />;
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<WorkoutApp />);
  </script>
</body>
</html>
