<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Home Workout</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0B0D14; font-family: system-ui, -apple-system, sans-serif; }
    input, textarea, button { font-family: inherit; }
    input[type=number]::-webkit-inner-spin-button { -webkit-appearance: none; }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: #13151F; }
    ::-webkit-scrollbar-thumb { background: #2A2D40; border-radius: 2px; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // ── Constants ────────────────────────────────────────────────
    const R    = 108;
    const CIRC = +(2 * Math.PI * R).toFixed(2);

    // ── Default stations ─────────────────────────────────────────
    const DEFAULT_STATIONS = [
      { id:1, name:"Warm-up",    color:"#10B981", workSecs:180, restSecs:30,
        exercise:"Bear Crawl",
        cue:"Hips low, full extension each step. Breathe steadily. Get the body warm and moving." },
      { id:2, name:"Cardio",     color:"#F97316", workSecs:180, restSecs:30,
        exercise:"High Knees",
        cue:"Drive knees to hip height. Stay light on your feet, fast rhythm. Arms pumping forward." },
      { id:3, name:"Upper Push", color:"#8B5CF6", workSecs:180, restSecs:30,
        exercise:"Push-ups",
        cue:"Elbows at 45° from body. Chest to floor, full lockout at the top. Controlled pace." },
      { id:4, name:"Upper Pull", color:"#3B82F6", workSecs:180, restSecs:30,
        exercise:"Band Rows",
        cue:"Drive elbows back, squeeze shoulder blades together. Control the return. Don't shrug." },
      { id:5, name:"Lower Body", color:"#06B6D4", workSecs:180, restSecs:30,
        exercise:"Goblet Squat",
        cue:"Chest tall, knees track over toes. Sit into your heels. Pause at the bottom. Full range." },
      { id:6, name:"Cool-down",  color:"#14B8A6", workSecs:120, restSecs:0,
        exercise:"Foam Roll & Stretch",
        cue:"Breathe into each stretch. Hold 20–30 seconds per area. Let the body slow down and relax." },
    ];

    // ── Audio ────────────────────────────────────────────────────
    let _ac = null;
    function getCtx() {
      if (!_ac) _ac = new (window.AudioContext || window.webkitAudioContext)();
      return _ac;
    }
    function beep(freq, dur = 0.12, vol = 0.28) {
      try {
        const c = getCtx(), o = c.createOscillator(), g = c.createGain();
        o.connect(g); g.connect(c.destination);
        o.frequency.value = freq;
        g.gain.setValueAtTime(vol, c.currentTime);
        g.gain.exponentialRampToValueAtTime(0.001, c.currentTime + dur);
        o.start(); o.stop(c.currentTime + dur + 0.05);
      } catch(e) {}
    }
    const tick    = () => beep(440, 0.07, 0.2);
    const chime   = () => { beep(660, 0.13, 0.3); setTimeout(() => beep(880, 0.2, 0.32), 130); };
    const fanfare = () => [523,659,784,1047].forEach((f,i) => setTimeout(() => beep(f, 0.32, 0.28), i*170));

    // ── State machine ────────────────────────────────────────────
    function derive(stations, elapsed) {
      if (elapsed < 0) return { phase:'countdown', cd: Math.abs(elapsed) };
      let cursor = 0;
      for (let i = 0; i < stations.length; i++) {
        const wEnd = cursor + stations[i].workSecs;
        if (elapsed < wEnd) return {
          phase:'work', idx:i,
          left: Math.ceil(wEnd - elapsed),
          progress: (elapsed - cursor) / stations[i].workSecs,
        };
        cursor = wEnd;
        if (stations[i].restSecs > 0 && i < stations.length - 1) {
          const rEnd = cursor + stations[i].restSecs;
          if (elapsed < rEnd) return {
            phase:'rest', idx:i, nextIdx: i+1,
            left: Math.ceil(rEnd - elapsed),
            progress: (elapsed - cursor) / stations[i].restSecs,
          };
          cursor = rEnd;
        }
      }
      return { phase:'done' };
    }

    function fmt(s) {
      return `${Math.floor(s / 60)}:${String(s % 60).padStart(2, '0')}`;
    }

    // ── Atoms ────────────────────────────────────────────────────
    const iBase = {
      width:'100%', background:'#1A1D2E', border:'1px solid #252940',
      borderRadius:6, color:'white', padding:'7px 10px',
      fontSize:13, boxSizing:'border-box', outline:'none',
    };

    function FL({ children }) {
      return <div style={{ fontSize:9, color:'#6B7280', fontWeight:700,
        letterSpacing:'0.1em', marginTop:10, marginBottom:4 }}>
        {String(children).toUpperCase()}
      </div>;
    }

    function NumStepper({ value, onChange, min, max, step=10, unit }) {
      return (
        <div style={{ display:'flex', alignItems:'center', gap:6 }}>
          <button onClick={() => onChange(Math.max(min, value - step))}
            style={{ width:30, height:30, borderRadius:6, background:'#252940',
              border:'none', color:'white', fontSize:18, cursor:'pointer', lineHeight:1 }}>−</button>
          <div style={{ flex:1, textAlign:'center', fontSize:15, fontWeight:700 }}>
            {value}<span style={{ fontSize:11, color:'#6B7280', marginLeft:3 }}>{unit}</span>
          </div>
          <button onClick={() => onChange(Math.min(max, value + step))}
            style={{ width:30, height:30, borderRadius:6, background:'#252940',
              border:'none', color:'white', fontSize:18, cursor:'pointer', lineHeight:1 }}>+</button>
        </div>
      );
    }

    // ── Config View ──────────────────────────────────────────────
    function ConfigView({ stations, onUpdate, onStart }) {
      const [openIdx, setOpenIdx] = useState(null);
      const total = stations.reduce(
        (a,s,i) => a + s.workSecs + (i < stations.length-1 ? s.restSecs : 0), 0
      );

      return (
        <div style={{ background:'#0B0D14', minHeight:'100vh', color:'white', padding:'22px 16px' }}>
          {/* Header */}
          <div style={{ textAlign:'center', marginBottom:24 }}>
            <div style={{ fontSize:11, letterSpacing:'0.22em', color:'#4B5280', fontWeight:700, marginBottom:6 }}>
              HOME WORKOUT
            </div>
            <div style={{ fontSize:28, fontWeight:900 }}>Configure Session</div>
            <div style={{ fontSize:12, color:'#6B7280', marginTop:5 }}>
              {Math.ceil(total / 60)} min total &nbsp;·&nbsp; {stations.length} stations
            </div>
          </div>

          {/* Cards */}
          <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:10, maxWidth:720, margin:'0 auto 24px' }}>
            {stations.map((s, i) => {
              const isOpen = openIdx === i;
              return (
                <div key={s.id} style={{ background:'#13151F', borderRadius:10,
                  border:`1px solid ${isOpen ? s.color : '#1E2130'}`,
                  overflow:'hidden', transition:'border-color 0.2s' }}>

                  {/* Card header */}
                  <div onClick={() => setOpenIdx(isOpen ? null : i)}
                    style={{ padding:'12px 13px', cursor:'pointer',
                      display:'flex', alignItems:'center', gap:10 }}>
                    <div style={{ width:4, alignSelf:'stretch', minHeight:40,
                      borderRadius:2, background:s.color, flexShrink:0 }} />
                    <div style={{ flex:1, minWidth:0 }}>
                      <div style={{ fontSize:9, color:s.color, fontWeight:700, letterSpacing:'0.1em' }}>
                        STATION {s.id}
                      </div>
                      <div style={{ fontSize:15, fontWeight:800 }}>{s.name}</div>
                      <div style={{ fontSize:11, color:'#6B7280',
                        whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis' }}>
                        {s.exercise}
                      </div>
                    </div>
                    <div style={{ textAlign:'right', flexShrink:0 }}>
                      <div style={{ fontSize:15, fontWeight:800, color:s.color }}>{fmt(s.workSecs)}</div>
                      <div style={{ fontSize:9, color:'#4B5280' }}>
                        {s.restSecs > 0 ? `+${s.restSecs}s rest` : 'no rest'}
                      </div>
                    </div>
                    <div style={{ color:'#4B5280', fontSize:11, marginLeft:2 }}>{isOpen ? '▲' : '▼'}</div>
                  </div>

                  {/* Editor */}
                  {isOpen && (
                    <div style={{ padding:'0 13px 14px', borderTop:'1px solid #1E2130' }}>
                      <FL>Exercise Name</FL>
                      <input value={s.exercise}
                        onChange={e => onUpdate(i, 'exercise', e.target.value)}
                        style={iBase} />

                      <FL>Coaching Cue</FL>
                      <textarea value={s.cue}
                        onChange={e => onUpdate(i, 'cue', e.target.value)}
                        rows={2}
                        style={{ ...iBase, resize:'vertical', lineHeight:1.5 }} />

                      <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:12, marginTop:10 }}>
                        <div>
                          <FL>Work time</FL>
                          <NumStepper value={s.workSecs}
                            onChange={v => onUpdate(i, 'workSecs', v)}
                            min={10} max={600} step={10} unit="sec" />
                        </div>
                        <div>
                          <FL>Rest time</FL>
                          <NumStepper value={s.restSecs}
                            onChange={v => onUpdate(i, 'restSecs', v)}
                            min={0} max={120} step={5} unit="sec" />
                        </div>
                      </div>
                    </div>
                  )}
                </div>
              );
            })}
          </div>

          {/* Tags + Start */}
          <div style={{ maxWidth:720, margin:'0 auto', textAlign:'center' }}>
            <div style={{ display:'flex', justifyContent:'center', gap:6,
              flexWrap:'wrap', marginBottom:18 }}>
              {stations.map(s => (
                <div key={s.id} style={{ padding:'4px 10px', borderRadius:20,
                  background:`${s.color}18`, border:`1px solid ${s.color}44`,
                  fontSize:10, color:s.color, fontWeight:700 }}>
                  {s.name} {fmt(s.workSecs)}
                </div>
              ))}
            </div>
            <button onClick={onStart}
              style={{ background:'#F97316', border:'none', color:'white',
                fontSize:17, fontWeight:900, padding:'15px 56px', borderRadius:10,
                cursor:'pointer', letterSpacing:'0.08em',
                boxShadow:'0 0 28px rgba(249,115,22,0.4)' }}>
              ▶&nbsp;&nbsp;START WORKOUT
            </button>
          </div>
        </div>
      );
    }

    // ── Session View ─────────────────────────────────────────────
    function SessionView({ ws, stations, onStop }) {
      const st     = stations[ws.idx ?? 0];
      const isWork = ws.phase === 'work';
      const isRest = ws.phase === 'rest';
      const isCd   = ws.phase === 'countdown';
      const isDone = ws.phase === 'done';

      const accent = isWork  ? (st?.color ?? '#F97316')
                   : isRest  ? '#3B82F6'
                   : isDone  ? '#10B981'
                   :            '#F97316';

      const offset = CIRC * (1 - (ws.progress ?? 0));

      return (
        <div style={{ background:'#0B0D14', minHeight:'100vh', color:'white',
          display:'flex', flexDirection:'column',
          alignItems:'center', justifyContent:'center',
          padding:'20px', position:'relative' }}>

          {/* Stop */}
          <button onClick={onStop}
            style={{ position:'absolute', top:16, right:16, background:'#1E2130',
              border:'1px solid #2A2D40', color:'#6B7280', borderRadius:8,
              padding:'6px 16px', fontSize:11, cursor:'pointer', fontWeight:700 }}>
            ✕ END
          </button>

          {/* Progress dots */}
          <div style={{ display:'flex', gap:7, marginBottom:30, alignItems:'center' }}>
            {stations.map((s, i) => {
              const done   = (ws.idx ?? 0) > i || isDone;
              const active = (ws.idx ?? 0) === i && !isDone;
              return (
                <div key={s.id} style={{ display:'flex', flexDirection:'column', alignItems:'center', gap:4 }}>
                  <div style={{ width: active ? 30 : 9, height:9, borderRadius:5,
                    background: done ? s.color : active ? accent : '#1E2130',
                    transition:'all 0.4s' }} />
                  {active && (
                    <div style={{ fontSize:7, color:accent, fontWeight:700, letterSpacing:'0.06em' }}>
                      {isRest && ws.idx === i ? 'REST' : 'NOW'}
                    </div>
                  )}
                </div>
              );
            })}
          </div>

          {/* COUNTDOWN */}
          {isCd && (
            <div style={{ textAlign:'center' }}>
              <div style={{ fontSize:13, color:'#6B7280', fontWeight:700,
                letterSpacing:'0.25em', marginBottom:22 }}>GET READY</div>
              <div style={{ fontSize:140, fontWeight:900, color:'#F97316', lineHeight:1,
                textShadow:'0 0 70px rgba(249,115,22,0.5)' }}>
                {ws.cd}
              </div>
              <div style={{ fontSize:14, color:'#4B5280', marginTop:22 }}>
                First up — <strong style={{ color:'white' }}>
                  {stations[0].name}: {stations[0].exercise}
                </strong>
              </div>
            </div>
          )}

          {/* DONE */}
          {isDone && (
            <div style={{ textAlign:'center' }}>
              <div style={{ fontSize:60, marginBottom:14 }}>🏁</div>
              <div style={{ fontSize:32, fontWeight:900, color:'#10B981', marginBottom:8 }}>
                Session Complete!
              </div>
              <div style={{ fontSize:14, color:'#6B7280', marginBottom:30 }}>
                {stations.length} stations · great work
              </div>
              <button onClick={onStop}
                style={{ background:'#10B981', border:'none', color:'white',
                  fontSize:15, fontWeight:800, padding:'14px 42px',
                  borderRadius:10, cursor:'pointer' }}>
                ← Back to Config
              </button>
            </div>
          )}

          {/* WORK / REST */}
          {(isWork || isRest) && st && (
            <>
              {/* Label */}
              <div style={{ fontSize:11, fontWeight:800, letterSpacing:'0.2em',
                color:accent, marginBottom:6, textAlign:'center' }}>
                {isWork
                  ? `STATION ${(ws.idx ?? 0) + 1} OF ${stations.length}`
                  : `REST — UP NEXT: STATION ${(ws.nextIdx ?? 0) + 1}`}
              </div>

              {/* Station name */}
              <div style={{ fontSize: isWork ? 32 : 20, fontWeight:900,
                marginBottom:4, textAlign:'center' }}>
                {isWork ? st.name : 'Active Recovery'}
              </div>

              {/* Exercise */}
              {isWork && (
                <div style={{ fontSize:21, fontWeight:700, color:accent,
                  marginBottom:12, textAlign:'center' }}>
                  {st.exercise}
                </div>
              )}

              {/* Next preview */}
              {isRest && ws.nextIdx != null && (
                <div style={{ fontSize:13, color:'#6B7280', marginBottom:12, textAlign:'center' }}>
                  {stations[ws.nextIdx].name} —&nbsp;
                  <span style={{ color:'white', fontWeight:600 }}>
                    {stations[ws.nextIdx].exercise}
                  </span>
                </div>
              )}

              {/* Circular timer */}
              <div style={{ position:'relative', width:268, height:268, margin:'4px 0 12px' }}>
                <svg width="268" height="268" style={{ transform:'rotate(-90deg)' }}>
                  <circle cx="134" cy="134" r={R} fill="none" stroke="#1E2130" strokeWidth="13" />
                  <circle cx="134" cy="134" r={R} fill="none"
                    stroke={accent} strokeWidth="13" strokeLinecap="round"
                    strokeDasharray={CIRC} strokeDashoffset={offset}
                    style={{ transition:'stroke-dashoffset 0.95s linear, stroke 0.5s ease' }} />
                </svg>
                <div style={{ position:'absolute', inset:0, display:'flex',
                  flexDirection:'column', alignItems:'center', justifyContent:'center' }}>
                  <div style={{ fontSize:62, fontWeight:900, fontVariantNumeric:'tabular-nums',
                    lineHeight:1, color: ws.left <= 5 ? '#EF4444' : 'white',
                    transition:'color 0.3s' }}>
                    {fmt(ws.left)}
                  </div>
                  <div style={{ fontSize:10, color:'#4B5280', fontWeight:700,
                    marginTop:6, letterSpacing:'0.12em' }}>
                    {isWork ? 'REMAINING' : 'REST'}
                  </div>
                </div>
              </div>

              {/* Cue */}
              {isWork && (
                <div style={{ maxWidth:350, width:'100%', textAlign:'center',
                  padding:'12px 18px', background:'#13151F',
                  border:`1px solid ${accent}55`, borderRadius:9 }}>
                  <div style={{ fontSize:9, color:accent, fontWeight:700,
                    letterSpacing:'0.12em', marginBottom:6 }}>COACHING CUE</div>
                  <div style={{ fontSize:14, color:'#D1D5DB', lineHeight:1.7 }}>
                    {st.cue}
                  </div>
                </div>
              )}
            </>
          )}
        </div>
      );
    }

    // ── Root ─────────────────────────────────────────────────────
    function WorkoutApp() {
      const [stations, setStations] = useState(DEFAULT_STATIONS);
      const [view,     setView]     = useState('config');
      const [elapsed,  setElapsed]  = useState(-3);
      const [running,  setRunning]  = useState(false);
      const intRef  = useRef(null);
      const prevRef = useRef({ phase: null, left: null, cd: null });

      const ws = derive(stations, elapsed);

      // Audio side-effects
      useEffect(() => {
        if (!running) return;
        const p = prevRef.current;
        if (ws.phase !== p.phase) {
          if      (ws.phase === 'work' && p.phase === 'countdown') chime();
          else if (ws.phase === 'work')  chime();
          else if (ws.phase === 'rest')  chime();
          else if (ws.phase === 'done') { fanfare(); setRunning(false); }
          p.phase = ws.phase;
        }
        if (ws.phase === 'countdown' && ws.cd !== p.cd) {
          if (ws.cd <= 3) tick();
          p.cd = ws.cd;
        }
        if ((ws.phase === 'work' || ws.phase === 'rest') && ws.left !== p.left) {
          if (ws.left <= 3 && ws.left > 0) tick();
          p.left = ws.left;
        }
      });

      // Timer
      useEffect(() => {
        if (running) {
          intRef.current = setInterval(() => setElapsed(e => e + 1), 1000);
        } else {
          clearInterval(intRef.current);
        }
        return () => clearInterval(intRef.current);
      }, [running]);

      const startWorkout = () => {
        setElapsed(-3);
        prevRef.current = { phase: 'countdown', left: null, cd: 3 };
        setRunning(true);
        setView('session');
      };
      const stopWorkout = () => {
        setRunning(false);
        setElapsed(-3);
        setView('config');
      };
      const updateStation = (i, field, val) =>
        setStations(s => s.map((st, idx) => idx === i ? { ...st, [field]: val } : st));

      return view === 'session'
        ? <SessionView ws={ws} stations={stations} onStop={stopWorkout} />
        : <ConfigView  stations={stations} onUpdate={updateStation} onStart={startWorkout} />;
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<WorkoutApp />);
  </script>
</body>
</html>
